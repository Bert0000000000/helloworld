# Prometheus 配置文件 - HelloWorld 项目
# 版本：v1.0
# 创建时间：2026-04-16

global:
  scrape_interval: 15s          # 默认采集间隔
  evaluation_interval: 15s      # 规则评估间隔
  external_labels:
    monitor: 'helloworld-monitor'
    environment: 'production'

# 告警管理器配置
alerting:
  alertmanagers:
    - static_configs:
        - targets:
          - alertmanager:9093

# 规则文件
rule_files:
  - /etc/prometheus/rules/*.yml

# 采集配置
scrape_configs:
  # Prometheus 自监控
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
  
  # 系统监控 (Node Exporter)
  - job_name: 'node'
    static_configs:
      - targets: ['localhost:9100']
        labels:
          instance: 'helloworld-server'
  
  # 应用监控
  - job_name: 'helloworld-app'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['localhost:8080']
        labels:
          service: 'helloworld-backend'
  
  # 前端监控 (通过 Pushgateway)
  - job_name: 'helloworld-frontend'
    static_configs:
      - targets: ['pushgateway:9091']
        labels:
          service: 'helloworld-frontend'
